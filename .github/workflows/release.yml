name: Release

# Builds a DMG, attaches it to a GitHub Release. Triggered by pushing a tag `v*` —
# typically `git tag v0.2.0 && git push origin v0.2.0`. Also runnable manually from the
# Actions tab via workflow_dispatch.
#
# Signing: optional. If you add the secrets WP_DEVELOPER_ID_CERT_BASE64,
# WP_DEVELOPER_ID_CERT_PASSWORD, WP_DEVELOPER_ID (the cert common name),
# WP_APPLE_ID, WP_APPLE_APP_PASSWORD, WP_TEAM_ID to the repo, the build will be
# signed + notarized. Without them, an unsigned DMG ships.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true

permissions:
  contents: write  # needed to create the release and upload assets

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install build tooling
        run: |
          brew install xcodegen create-dmg xcbeautify

      # Optional: import the Developer ID certificate so the build is signed. Skipped if
      # the secret isn't set (e.g. on a fork or a first-time contributor PR).
      - name: Import code-signing certificate
        if: ${{ env.WP_DEVELOPER_ID_CERT_BASE64 != '' }}
        env:
          WP_DEVELOPER_ID_CERT_BASE64: ${{ secrets.WP_DEVELOPER_ID_CERT_BASE64 }}
          WP_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.WP_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/dev_id.p12
          echo "$WP_DEVELOPER_ID_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$WP_DEVELOPER_ID_CERT_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"

      - name: Build DMG
        env:
          WP_DEVELOPER_ID: ${{ secrets.WP_DEVELOPER_ID }}
          WP_APPLE_ID: ${{ secrets.WP_APPLE_ID }}
          WP_APPLE_APP_PASSWORD: ${{ secrets.WP_APPLE_APP_PASSWORD }}
          WP_TEAM_ID: ${{ secrets.WP_TEAM_ID }}
        run: |
          ./bin/release "${{ steps.ver.outputs.version }}"

      - name: Read SHA-256
        id: sha
        run: |
          SHA=$(awk '{print $1}' "build/WhisperPilot-${{ steps.ver.outputs.version }}.dmg.sha256")
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          DMG="build/WhisperPilot-${VERSION}.dmg"
          NOTES="**SHA-256:** \`${{ steps.sha.outputs.sha256 }}\`

          Install via Homebrew (once the tap is updated):
          \`\`\`
          brew install --cask vertocode/whisper-pilot/whisper-pilot
          \`\`\`

          Or download the .dmg below."

          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release upload "v${VERSION}" "${DMG}" --clobber
          else
            gh release create "v${VERSION}" "${DMG}" \
                --title "Whisper Pilot ${VERSION}" \
                --notes "${NOTES}"
          fi

      # Auto-bump the cask in the Homebrew tap so `brew upgrade --cask whisper-pilot`
      # picks up the new version. The default GITHUB_TOKEN can't push to a different
      # repository, so this step needs a fine-grained PAT with Contents: Write access
      # to vertocode/homebrew-whisper-pilot, stored as the TAP_REPO_TOKEN repo secret.
      # If the secret isn't set, this step prints a warning and exits 0 — the release
      # itself still succeeded, you just have to update the tap manually.
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA: ${{ steps.sha.outputs.sha256 }}
        run: |
          if [[ -z "${TAP_TOKEN}" ]]; then
            echo "::warning::TAP_REPO_TOKEN secret is not set — skipping tap update."
            echo "::warning::Set it (a fine-grained PAT with Contents:Write on vertocode/homebrew-whisper-pilot) to auto-bump the cask."
            exit 0
          fi

          TAP_DIR="$RUNNER_TEMP/tap"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/vertocode/homebrew-whisper-pilot.git" "${TAP_DIR}"
          cd "${TAP_DIR}"

          # The cask uses 2-space Ruby indentation. Anchor on the leading whitespace
          # so we don't match something inside a comment or a string later in the file.
          sed -i '' "s/^  version .*/  version \"${VERSION}\"/" Casks/whisper-pilot.rb
          sed -i '' "s/^  sha256 .*/  sha256 \"${SHA}\"/"     Casks/whisper-pilot.rb

          if git diff --quiet; then
            echo "Tap cask already at v${VERSION} — nothing to commit."
            exit 0
          fi

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Casks/whisper-pilot.rb
          git commit -m "chore: bump to v${VERSION}"
          git push
          echo "✓ Tap updated. Users running 'brew upgrade --cask whisper-pilot' will get v${VERSION}."

      - name: Upload artifact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: WhisperPilot-${{ steps.ver.outputs.version }}-dmg
          path: build/WhisperPilot-${{ steps.ver.outputs.version }}.dmg
