name: Release

# Manual: Actions â†’ Release â†’ Run workflow, type a version, click Run.
# Automatic: push a tag like `v0.2.0` and the same workflow fires.
#
# Both paths invoke ./bin/release, the exact same script you can run locally.
# Local equivalent: `./bin/release --version 0.2.0`
#
# Signing/notarization is optional. Set these as repo Secrets to enable:
#   WP_DEVELOPER_ID_CERT_BASE64, WP_DEVELOPER_ID_CERT_PASSWORD,
#   WP_DEVELOPER_ID, WP_APPLE_ID, WP_APPLE_APP_PASSWORD, WP_TEAM_ID
# Homebrew tap update needs:
#   TAP_REPO_TOKEN  (fine-grained PAT with Contents:Write on vertocode/homebrew-whisper-pilot)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    # macos-26 is required: the project references `SpeechAnalyzer`,
    # `SpeechTranscriber`, and `AssetInventory` (Speech.framework additions in the
    # macOS 26 SDK). Those types must exist at compile time even though their use
    # is gated at runtime with `@available(macOS 26.0, *)`. Older runners (macos-15
    # and below) ship an SDK that doesn't declare them, and the archive step fails
    # with "cannot find type 'SpeechAnalyzer' in scope".
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # Explicitly select the newest installed Xcode so we don't accidentally
      # archive against an older SDK that's also present on the runner image.
      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      - name: Install build tooling
        run: brew install xcodegen create-dmg xcbeautify

      # Optional: import a Developer ID cert so the build is signed. The step is gated
      # on the secret being non-empty so unsigned-fork builds still pass.
      - name: Import code-signing certificate
        if: ${{ env.WP_DEVELOPER_ID_CERT_BASE64 != '' }}
        env:
          WP_DEVELOPER_ID_CERT_BASE64: ${{ secrets.WP_DEVELOPER_ID_CERT_BASE64 }}
          WP_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.WP_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/dev_id.p12
          echo "$WP_DEVELOPER_ID_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$WP_DEVELOPER_ID_CERT_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"

      # The whole release flow (build â†’ optional sign/notarize â†’ DMG â†’ GitHub Release
      # â†’ Homebrew tap update) lives in bin/release so local and CI run identical code.
      - name: Release
        env:
          WP_DEVELOPER_ID: ${{ secrets.WP_DEVELOPER_ID }}
          WP_APPLE_ID: ${{ secrets.WP_APPLE_ID }}
          WP_APPLE_APP_PASSWORD: ${{ secrets.WP_APPLE_APP_PASSWORD }}
          WP_TEAM_ID: ${{ secrets.WP_TEAM_ID }}
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          ./bin/release --version "${{ steps.ver.outputs.version }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperPilot-${{ steps.ver.outputs.version }}-dmg
          path: build/WhisperPilot-${{ steps.ver.outputs.version }}.dmg
